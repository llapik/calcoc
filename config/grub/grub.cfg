set default=0
set timeout=10
set gfxmode=auto

insmod all_video
insmod gfxterm
terminal_output gfxterm

loadfont /boot/grub/fonts/unicode.pf2

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "AI PC Repair & Optimizer — Normal Mode" {
    linux /boot/vmlinuz root=live:LABEL=AIREPAIR rd.live.image rd.live.overlay.persistent quiet splash
    initrd /boot/initrd.img
}

menuentry "AI PC Repair & Optimizer — Safe Mode (no AI)" {
    linux /boot/vmlinuz root=live:LABEL=AIREPAIR rd.live.image noai quiet splash
    initrd /boot/initrd.img
}

menuentry "AI PC Repair & Optimizer — Expert Mode" {
    linux /boot/vmlinuz root=live:LABEL=AIREPAIR rd.live.image rd.live.overlay.persistent expert
    initrd /boot/initrd.img
}

menuentry "AI PC Repair & Optimizer — Rollback Last Session" {
    linux /boot/vmlinuz root=live:LABEL=AIREPAIR rd.live.image rollback quiet splash
    initrd /boot/initrd.img
}

menuentry "Boot from local disk" {
    chainloader +1
}

menuentry "UEFI Firmware Settings" {
    fwsetup
}
